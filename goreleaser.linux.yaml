version: 2

project_name: bao

before:
  hooks:
    - go mod tidy
    - go generate ./...
    - make bootstrap

builds:
- id: builds-linux
  tags:
  - ui
  ldflags:
  - -X github.com/openbao/openbao/version.fullVersion={{.Version}} -X github.com/openbao/openbao/version.GitCommit={{.Commit}} -X github.com/openbao/openbao/version.BuildDate={{ .Date }}
  env:
  - CGO_ENABLED=0
  goos:
  - linux
  goarch:
  - amd64
  - arm64
  goarm:
  - "6"
  ignore:
  - goos: darwin
  - goos: dragonfly
  - goos: freebsd
  - goos: illumos
  - goos: netbsd
  - goos: openbsd
  - goos: windows
  mod_timestamp: "{{ .CommitTimestamp }}"
  skip: false

report_sizes: false

checksum:
  disable: true

changelog:
  disable: true

release:
  disable: true

dockers_v2:
- images:
  - "cr.orbit.dev/ops/openbao"
  tags:
  - "{{ .Version }}"
  labels:
    org.opencontainers.image.title: "{{ .ProjectName }}"
    org.opencontainers.image.vendor: "OpenBao"
    org.opencontainers.image.description: "OpenBao {{ .Version }}"
    org.opencontainers.image.url: "https://github.com/openbao/openbao"
    org.opencontainers.image.documentation: "https://github.com/openbao/openbao/blob/main/README.md"
    org.opencontainers.image.source: "https://github.com/openbao/openbao"
    org.opencontainers.image.licenses: "MPL-2.0"
    org.opencontainers.image.version: "{{ .Version }}"
    org.opencontainers.image.revision: "{{ .FullCommit }}"
    org.opencontainers.image.created: '{{ time "2006-01-02T15:04:05Z07:00" }}'
    release: "{{ .Version }}"
    revision: "{{ .FullCommit }}"
    version: "{{ .Version }}"
  extra_files:
  - LICENSE
  - .release/docker/docker-entrypoint.sh
